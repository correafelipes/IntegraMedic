<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntegraMedic - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        
        <!-- Logo IntegraMedic -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="bg-blue-600 p-3 rounded-full mb-3 shadow-lg">
                <!-- Ícone SVG combinando cruz médica e design moderno -->
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v4m-2-2h4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Integra<span class="text-blue-600">Medic</span></h1>
            <p class="text-sm text-gray-500 mt-1">Gestão de Clínicas e Consultórios</p>
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Usuário</label>
                <div class="mt-1">
                    <input id="username" type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 shadow-sm" placeholder="Digite seu usuário">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Senha</label>
                <div class="mt-1">
                    <input id="password" type="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 shadow-sm" placeholder="••••••••">
                </div>
            </div>

            <!-- Mensagem de Erro (Oculta por padrão) -->
            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-md border border-red-200 text-center">
                Usuário ou senha incorretos!
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Acessar Sistema
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            &copy; 2026 IntegraMedic Software SaaS.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            // Credenciais hardcoded solicitadas
            if (user === 'correfs' && pass === 'FelipeC19') {
                // Simula autenticação bem-sucedida de um usuário DONO/ADMIN
                localStorage.setItem('integraMedic_userRole', 'DONO');
                localStorage.setItem('integraMedic_userName', 'Felipe Correa');
                
                // Redireciona para o painel (tela de cadastro de usuários por enquanto)
                window.location.href = 'cadastro-usuarios.html';
            } else {
                // Falha no login
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
